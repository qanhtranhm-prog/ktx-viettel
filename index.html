<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QLTS Viettel - Sửa Lỗi Giao Diện</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen">
    <header class="bg-red-600 p-4 rounded-b-3xl shadow-lg flex justify-between items-center text-white">
        <div class="flex items-center space-x-3">
            <i class="fas fa-building text-3xl"></i>
            <div>
                <h1 class="font-bold text-lg uppercase">QLTS Viettel</h1>
                <p class="text-xs">Smart KTX System 2026</p>
            </div>
        </div>
        <button class="bg-red-700 text-white font-semibold py-2 px-6 rounded-full border border-white hover:bg-red-800 transition duration-300">
            QUẢN LÝ
        </button>
    </header>

    <main class="flex justify-center items-center py-10 px-4">
        <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-lg text-center space-y-6">
            
            <div class="space-y-4">
                <div class="bg-red-100 rounded-full w-20 h-20 flex justify-center items-center mx-auto text-red-500">
                    <i class="fas fa-id-card text-4xl"></i>
                </div>
                
                <h2 class="font-bold text-3xl uppercase tracking-wider text-gray-800">
                    TRA CỨU THÔNG TIN </h2>
                
                <p class="text-gray-600 text-sm">
                    Nhập Mã Nhân Viên để xem phòng được phân công.
                </p>
            </div>

            <div class="space-y-4">
                <input type="text" placeholder="MÃ NHÂN VIÊN (VD: VTE001)" class="bg-gray-50 border border-gray-200 rounded-2xl w-full p-4 text-center focus:outline-none focus:ring-2 focus:ring-red-300 transition duration-300">
                
                <button class="bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-2xl w-full flex justify-center items-center space-x-2 transition duration-300 shadow-md">
                    <i class="fas fa-search"></i>
                    <span>KIỂM TRA HỆ THỐNG</span>
                </button>
            </div>

            <div>
                <a href="#" class="text-gray-500 hover:text-red-600 transition duration-300 text-sm font-semibold uppercase tracking-wider">
                    QUAY LẠI TRANG CHỦ
                </a>
            </div>
        </div>
    </main>

    <div class="text-center py-4">
        <a href="#" class="text-gray-500 hover:text-red-600 transition duration-300 text-sm underline">
            Nhận phòng thủ công (Không có trong DS)
        </a>
    </div>
</body>
</html>
