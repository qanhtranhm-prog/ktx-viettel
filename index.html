<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTX VIETTEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, sans-serif; background: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .v-btn { background: #ee0000; color: white; transition: 0.2s; }
        .v-btn:active { transform: scale(0.98); opacity: 0.9; }
        .card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; }
        .room-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(55px, 1fr)); gap: 5px; }
        .status-empty { background: #f1f5f9; color: #94a3b8; border: 1px solid #e2e8f0; }
        .status-occupied { background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; }
    </style>
</head>
<body class="p-3">
    <div class="max-w-md mx-auto min-h-screen flex flex-col space-y-3">
        
        <header class="v-btn p-3.5 rounded-xl flex justify-between items-center shadow-md">
            <div onclick="location.reload()" class="flex items-center space-x-2">
                <i class="fas fa-hotel"></i>
                <span class="font-bold text-sm tracking-tight uppercase">Quản lý KTX Viettel</span>
            </div>
            <button onclick="authAdmin()" class="bg-white/20 px-3 py-1 rounded-lg text-[10px] font-bold uppercase">Admin</button>
        </header>

        <div id="homeView" class="grid grid-cols-2 gap-3 pt-2">
            <button onclick="showView('checkInView')" class="card p-6 text-center space-y-2 hover:bg-slate-50 transition-all">
                <i class="fas fa-sign-in-alt text-2xl text-blue-500"></i>
                <p class="font-bold text-xs">NHẬN PHÒNG</p>
            </button>
            <button onclick="showView('checkOutView')" class="card p-6 text-center space-y-2 hover:bg-slate-50 transition-all">
                <i class="fas fa-sign-out-alt text-2xl text-red-500"></i>
                <p class="font-bold text-xs">TRẢ PHÒNG</p>
            </button>
        </div>

        <section id="checkInView" class="hidden space-y-3">
            <div class="card p-4 space-y-3">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">Thông tin khách đến</h3>
                <input type="text" id="inName" placeholder="HỌ VÀ TÊN" class="w-full p-3 bg-slate-50 border rounded-lg font-bold uppercase outline-none focus:border-red-500 text-sm">
                <input type="number" id="inRoom" placeholder="SỐ PHÒNG" class="w-full p-3 bg-slate-50 border rounded-lg font-black text-lg outline-none focus:border-red-500">
                <textarea id="inNote" placeholder="Ghi chú hỏng hóc nếu có..." class="w-full p-3 bg-slate-50 border rounded-lg text-xs outline-none" rows="2"></textarea>
                <label class="flex items-center space-x-2 py-2 cursor-pointer">
                    <input type="checkbox" id="inAgree" class="w-5 h-5 accent-red-600 rounded">
                    <span class="text-[10px] font-bold text-slate-500 uppercase">Xác nhận đúng tài sản & nội quy</span>
                </label>
                <button id="btnIn" onclick="handleIn()" class="v-btn w-full py-3.5 rounded-lg font-bold text-sm shadow-lg shadow-red-200">XÁC NHẬN GỬI</button>
                <button onclick="showView('homeView')" class="w-full text-slate-400 font-bold text-[10px] uppercase py-1">Quay lại</button>
            </div>
        </section>

        <section id="checkOutView" class="hidden space-y-3">
            <div class="card p-4 space-y-4 text-center">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">Thủ tục trả phòng</h3>
                <input type="text" id="outName" placeholder="TÊN NGƯỜI TRẢ" class="w-full p-3 bg-slate-50 border rounded-lg font-bold text-center uppercase outline-none focus:border-red-500 text-sm">
                <input type="number" id="outRoom" placeholder="SỐ PHÒNG" class="w-full p-3 bg-slate-50 border rounded-lg font-black text-2xl text-center outline-none focus:border-red-500">
                <button id="btnOut" onclick="handleOut()" class="v-btn w-full py-3.5 rounded-lg font-bold text-sm shadow-lg shadow-red-200">BÁO TRẢ PHÒNG</button>
                <button onclick="showView('homeView')" class="w-full text-slate-400 font-bold text-[10px] uppercase py-1">Quay lại</button>
            </div>
        </section>

        <section id="adminView" class="hidden space-y-3 pb-20">
            <div class="flex justify-between items-center px-1">
                <h2 class="font-black text-slate-800 text-sm uppercase">Sơ đồ KTX hiện tại</h2>
                <div class="flex space-x-2 text-[9px] font-bold">
                    <span class="flex items-center"><span class="w-2 h-2 bg-slate-200 rounded-full mr-1"></span> TRỐNG</span>
                    <span class="flex items-center"><span class="w-2 h-2 bg-red-400 rounded-full mr-1"></span> ĐANG Ở</span>
                </div>
            </div>
            <div id="adminContent" class="space-y-4"></div>
            <button onclick="showView('homeView')" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-2.5 rounded-full font-bold text-xs shadow-xl z-50">ĐÓNG SƠ ĐỒ</button>
        </section>

    </div>

    <script>
        const config = {
            sheet: "https://script.google.com/macros/s/AKfycbyCFrostOu5bPgjxOOTCoMrR8XF1GQnn05x_7lymeQYP113Tsgm9vqa7Olzi04bfBRW/exec",
            token: "8628522316:AAEEZavf7qnnENTEzGTb2dmmYDHhunZ9qT4",
            chatId: "-1003878344099",
            pin: "271020"
        };

        // Danh sách phòng giả định để quản lý (Bạn có thể sửa danh sách này)
        let roomStatus = {}; 

        function showView(id) {
            document.querySelectorAll('section, #homeView').forEach(v => v.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function handleIn() {
            const name = document.getElementById('inName').value.trim().toUpperCase();
            const room = document.getElementById('inRoom').value;
            if(!name || !room || !document.getElementById('inAgree').checked) return alert("Thiếu thông tin!");
            
            setBtn('btnIn', true);
            roomStatus[room] = name; // Cập nhật trạng thái
            await fetch(config.sheet, { method: "POST", mode: "no-cors", body: JSON.stringify({ type: "NHẬN PHÒNG", room: room, name: name }) });
            await fetch(`https://api.telegram.org/bot${config.token}/sendMessage?chat_id=${config.chatId}&text=${encodeURIComponent(`🟢 NHẬN: ${room}\n👤 Tên: ${name}\n📝 Ghi chú: ${document.getElementById('inNote').value || "Không"}`)}`);
            alert("Thành công!");
            location.reload();
        }

        async function handleOut() {
            const name = document.getElementById('outName').value.trim().toUpperCase();
            const room = document.getElementById('outRoom').value;
            if(!name || !room) return alert("Thiếu thông tin!");

            setBtn('btnOut', true);
            delete roomStatus[room]; // Xóa trạng thái ở
            await fetch(config.sheet, { method: "POST", mode: "no-cors", body: JSON.stringify({ type: "TRẢ PHÒNG", room: room, name: name }) });
            await fetch(`https://api.telegram.org/bot${config.token}/sendMessage?chat_id=${config.chatId}&text=${encodeURIComponent(`🔴 TRẢ: ${room}\n👤 Tên: ${name}`)}`);
            alert("Đã báo trả!");
            location.reload();
        }

        function setBtn(id, loading) {
            const btn = document.getElementById(id);
            btn.disabled = loading;
            btn.innerHTML = loading ? '<i class="fas fa-sync fa-spin"></i>' : 'XÁC NHẬN';
        }

        function authAdmin() {
            if(prompt("Mã PIN:") === config.pin) {
                showView('adminView');
                renderAdmin();
            }
        }

        function renderAdmin() {
            const cont = document.getElementById('adminContent');
            cont.innerHTML = '';
            // Quy tắc tạo số phòng KTX của bạn
            for(let f=1; f<=9; f++) {
                let roomsHTML = "";
                let start = f*100+1;
                let end = (f===1)?111:(f<=5?f*100+25:f*100+12);
                
                for(let i=start; i<=end; i++) {
                    // Logic kiểm tra phòng có người hay không (tạm thời demo màu sắc)
                    roomsHTML += `<div class="status-empty py-2.5 rounded-lg text-[10px] font-black text-center shadow-sm">${i}</div>`;
                }
                cont.innerHTML += `<div><h3 class="text-[9px] font-black text-slate-400 uppercase mb-1.5 ml-1">Tầng ${f}</h3><div class="room-grid">${roomsHTML}</div></div>`;
            }
        }
    </script>
</body>
</html>
