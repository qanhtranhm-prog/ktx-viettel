<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quản lý KTX Viettel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .room-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 6px; }
        .viettel-red { background-color: #ee0000; }
        .viettel-text-red { color: #ee0000; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <div class="max-w-md mx-auto min-h-screen flex flex-col shadow-2xl bg-white relative">
        <header class="viettel-red text-white p-4 sticky top-0 z-50 shadow-md flex justify-between items-center">
            <div class="flex items-center space-x-2" onclick="goHome()" style="cursor: pointer;">
                <i class="fas fa-building text-lg"></i>
                <h1 class="font-black text-sm uppercase tracking-tighter">KTX VIETTEL</h1>
            </div>
            <button onclick="switchAdminView()" id="toggleBtn" class="bg-white/20 px-3 py-1.5 rounded-lg text-[10px] font-bold border border-white/30 uppercase">
                <i class="fas fa-user-shield mr-1"></i> QUẢN LÝ
            </button>
        </header>

        <main class="flex-grow p-4">
            <section id="homeView" class="space-y-6 pt-8">
                <div class="text-center mb-10">
                    <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tight">Hệ thống KTX</h2>
                    <p class="text-slate-500 text-sm mt-1">Học viện Viettel</p>
                </div>
                <div class="grid grid-cols-1 gap-5">
                    <button onclick="showCheckIn()" class="bg-white border-2 border-blue-100 p-8 rounded-[2.5rem] shadow-xl flex flex-col items-center space-y-4 hover:border-blue-500 active:scale-95 transition-all">
                        <div class="bg-blue-50 p-5 rounded-full text-blue-600"><i class="fas fa-door-open text-4xl"></i></div>
                        <span class="font-black text-xl text-slate-800 uppercase">NHẬN PHÒNG</span>
                    </button>
                    <button onclick="showCheckOut()" class="bg-white border-2 border-red-100 p-8 rounded-[2.5rem] shadow-xl flex flex-col items-center space-y-4 hover:border-red-500 active:scale-95 transition-all">
                        <div class="bg-red-50 p-5 rounded-full text-red-600"><i class="fas fa-key text-4xl"></i></div>
                        <span class="font-black text-xl text-slate-800 uppercase">TRẢ PHÒNG</span>
                    </button>
                </div>
            </section>

            <section id="checkInView" class="hidden space-y-4 pt-2 pb-10">
                <div class="flex items-center space-x-2 mb-4 cursor-pointer text-slate-400" onclick="goHome()">
                    <i class="fas fa-arrow-left"></i> <span class="text-sm font-bold uppercase">Quay lại</span>
                </div>
                
                <div class="bg-blue-600 text-white p-5 rounded-2xl shadow-lg mb-4 space-y-3">
                    <div>
                        <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest mb-1 italic">Họ và Tên khách hàng:</p>
                        <input type="text" id="checkInName" placeholder="HỌ VÀ TÊN" class="w-full p-3 text-lg font-bold text-slate-800 rounded-xl outline-none shadow-inner uppercase">
                    </div>
                    <div>
                        <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest mb-1 italic">Số phòng:</p>
                        <input type="number" id="checkInRoom" placeholder="SỐ PHÒNG" class="w-full p-3 text-2xl font-black text-center text-slate-800 rounded-xl outline-none shadow-inner">
                    </div>
                </div>

                <div class="border-2 border-slate-200 rounded-2xl overflow-hidden bg-white">
                    <div class="bg-slate-100 p-2 text-center font-black text-[9px] uppercase text-slate-500 tracking-widest">Kiểm tra Tài sản</div>
                    <div class="h-64 overflow-y-auto custom-scroll p-4 text-[12px] text-slate-700 space-y-3" id="assetList">
                        </div>
                    <div class="p-3 border-t">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Ghi chú sự cố (nếu có):</p>
                        <textarea id="checkInNote" class="w-full p-2 border rounded-lg text-xs outline-none focus:border-blue-400" rows="2" placeholder="Ví dụ: Tivi hỏng, thiếu khăn..."></textarea>
                    </div>
                </div>

                <label class="flex items-start space-x-3 p-4 bg-blue-50 rounded-2xl border border-blue-200 cursor-pointer">
                    <input type="checkbox" id="agreeCheckIn" class="mt-1 w-5 h-5 accent-blue-600 rounded">
                    <span class="text-[11px] font-bold text-blue-900 leading-tight">Tôi cam đoan đã kiểm tra kỹ. Tài sản được tích là đầy đủ và tốt.</span>
                </label>

                <button onclick="handleCheckIn()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition-all text-lg uppercase tracking-widest">
                    XÁC NHẬN NHẬN PHÒNG
                </button>
            </section>

            <section id="checkOutView" class="hidden space-y-6 pt-2">
                <div class="flex items-center space-x-2 mb-4 cursor-pointer text-slate-400" onclick="goHome()">
                    <i class="fas fa-arrow-left"></i> <span class="text-sm font-bold uppercase">Quay lại</span>
                </div>
                <div class="bg-white p-8 rounded-[2rem] shadow-2xl border border-slate-100 text-center">
                    <div class="bg-red-50 inline-block p-6 rounded-full mb-4 text-red-600"><i class="fas fa-paper-plane text-4xl"></i></div>
                    <h2 class="text-2xl font-black text-slate-800 uppercase mb-6">BÁO TRẢ PHÒNG</h2>
                    <input type="number" id="checkOutRoom" placeholder="SỐ PHÒNG" class="w-full p-4 text-5xl font-black text-center border-b-4 border-slate-200 focus:border-red-500 focus:outline-none mb-8">
                    <button onclick="handleCheckOut()" class="w-full viettel-red text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-all text-lg uppercase">
                        GỬI THÔNG BÁO TRẢ
                    </button>
                </div>
            </section>

            <section id="adminView" class="hidden space-y-6 pb-20">
                <div id="floorContainer" class="space-y-6"></div>
            </section>
        </main>

        <div id="notification" class="fixed bottom-10 left-6 right-6 transform translate-y-48 transition duration-500 z-[100]">
            <div id="notifContent" class="p-5 rounded-3xl shadow-2xl flex items-center space-x-4 border-2 bg-white">
                <i id="notifIcon" class="text-3xl"></i>
                <p id="notifMessage" class="text-sm font-black uppercase tracking-tight leading-tight"></p>
            </div>
        </div>
    </div>

    <script>
        const telegramToken = "8628522316:AAEEZavf7qnnENTEzGTb2dmmYDHhunZ9qT4"; 
        const chatId = "6074347518"; 
        const sheetURL = "https://script.google.com/macros/s/AKfycbzgmLSydKi8L7_b_MopivUWfEvxVrj0DNW7b7OXAAYA5qGbDB_34ARUqHcFmt3gzBkA/exec";

        const assetNames = [
            "Chìa khóa", "Tivi", "Điều khiển Tivi", "Đầu KTS", "Tủ lạnh", "Điều hòa", 
            "Đ.khiển điều hòa", "Đ.khiển quạt", "Tủ đồ", "Khóa tủ", "Đệm", "Chăn", "Ga", "Gối", 
            "Cốc thủy tinh", "Khay inox", "Giá phơi", "Lọ sữa tắm", "Lọ dầu gội", "Lọ rửa tay", 
            "Cốc đánh răng", "Đồ cá nhân", "Xô nhựa", "Chậu nhựa", "Thùng rác", "Ấm siêu tốc", 
            "Đèn học", "Dép", "Cầu là", "Bàn là"
        ];

        let rooms = [];

        function initRooms() {
            const config = [
                { floor: 1, start: 101, end: 111 }, { floor: 2, start: 201, end: 225 },
                { floor: 3, start: 301, end: 325 }, { floor: 4, start: 401, end: 425 },
                { floor: 5, start: 501, end: 525 }, { floor: 6, start: 601, end: 612 },
                { floor: 7, start: 701, end: 712 }, { floor: 8, start: 801, end: 812 },
                { floor: 9, start: 901, end: 912 }
            ];
            config.forEach(c => {
                for(let i = c.start; i <= c.end; i++) {
                    rooms.push({ id: i, floor: c.floor, status: 'available', occupant: '' });
                }
            });

            const assetList = document.getElementById('assetList');
            assetNames.forEach((name, i) => {
                const div = document.createElement('label');
                div.className = "flex items-center justify-between p-2 bg-slate-50 rounded-lg border text-[11px]";
                div.innerHTML = `<span>${i+1}. ${name}</span><input type="checkbox" checked class="asset-item w-4 h-4 accent-green-600" data-name="${name}">`;
                assetList.appendChild(div);
            });
        }

        function sendToSheet(data) {
            fetch(sheetURL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
        }

        async function handleCheckIn() {
            const name = document.getElementById('checkInName').value.trim();
            const roomNo = parseInt(document.getElementById('checkInRoom').value);
            const isAgreed = document.getElementById('agreeCheckIn').checked;
            const extraNote = document.getElementById('checkInNote').value.trim();
            const room = rooms.find(r => r.id === roomNo);

            if (!name || !room || !isAgreed) return showNotification("Vui lòng điền đủ thông tin!", "error");
            
            let issues = [];
            document.querySelectorAll('.asset-item').forEach(cb => { if(!cb.checked) issues.push(cb.getAttribute('data-name')); });
            
            room.status = 'occupied';
            room.occupant = name;

            const msg = `🟢 NHẬN PHÒNG: ${roomNo}\n👤 Khách: ${name.toUpperCase()}\n⚠️ Lỗi: ${issues.join(", ") || "Không"}\n📝 Ghi chú: ${extraNote || "Không"}`;
            
            sendToSheet({ type: "NHẬN PHÒNG", room: roomNo, name: name.toUpperCase(), issues: issues.join(", ") || "Không có", note: extraNote || "Không" });
            
            try {
                await fetch(`https://api.telegram.org/bot${telegramToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`);
                showNotification(`Thành công phòng ${roomNo}`, "success");
                goHome();
            } catch (e) { showNotification("Lỗi kết nối!", "error"); }
        }

        async function handleCheckOut() {
            const roomNo = parseInt(document.getElementById('checkOutRoom').value);
            const room = rooms.find(r => r.id === roomNo);
            if (!room) return showNotification("Số phòng không đúng!", "error");
            
            room.status = 'pending';
            const msg = `🔴 BÁO TRẢ PHÒNG: ${roomNo}`;
            sendToSheet({ type: "TRẢ PHÒNG", room: roomNo, name: room.occupant || "Không tên", issues: "", note: "" });

            try {
                await fetch(`https://api.telegram.org/bot${telegramToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`);
                showNotification(`Đã báo trả phòng ${roomNo}`, "success");
                goHome();
            } catch (e) { showNotification("Lỗi kết nối!", "error"); }
        }

        function hideAllViews() { document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); }
        function goHome() { hideAllViews(); document.getElementById('homeView').classList.remove('hidden'); }
        function showCheckIn() { hideAllViews(); document.getElementById('checkInView').classList.remove('hidden'); }
        function showCheckOut() { hideAllViews(); document.getElementById('checkOutView').classList.remove('hidden'); }
        
        function switchAdminView() {
            const admin = document.getElementById('adminView');
            if (admin.classList.contains('hidden')) {
                hideAllViews(); admin.classList.remove('hidden');
                document.getElementById('toggleBtn').innerHTML = '<i class="fas fa-home mr-1"></i> TRANG CHỦ';
                renderAdminDashboard();
            } else { goHome(); }
        }

        function renderAdminDashboard() {
            const container = document.getElementById('floorContainer');
            container.innerHTML = '';
            const floors = [...new Set(rooms.map(r => r.floor))];
            floors.forEach(f => {
                const floorDiv = document.createElement('div');
                floorDiv.innerHTML = `<h3 class="text-[10px] font-black text-slate-400 mb-2 uppercase border-l-4 border-red-500 pl-2">Tầng ${f}</h3><div class="room-grid"></div>`;
                const grid = floorDiv.querySelector('.room-grid');
                rooms.filter(r => r.floor === f).forEach(room => {
                    const btn = document.createElement('div');
                    let style = room.status === 'occupied' ? 'bg-blue-600 text-white shadow-md' : room.status === 'pending' ? 'bg-red-600 text-white animate-pulse shadow-lg' : 'bg-slate-50 text-slate-300 border border-slate-100';
                    btn.className = `${style} py-2.5 rounded-lg text-center font-black text-[9px] cursor-pointer`;
                    btn.innerText = room.id;
                    btn.onclick = () => { if(confirm(`Dọn xong phòng ${room.id}?`)) { room.status = 'available'; room.occupant = ''; renderAdminDashboard(); }};
                    grid.appendChild(btn);
                });
                container.appendChild(floorDiv);
            });
        }

        function showNotification(msg, type) {
            const notif = document.getElementById('notification');
            const content = document.getElementById('notifContent');
            const message = document.getElementById('notifMessage');
            message.innerText = msg;
            content.className = `p-5 rounded-3xl shadow-2xl flex items-center space-x-4 border-2 bg-white ${type === 'success' ? 'border-green-500 text-green-600' : 'border-red-500 text-red-600'}`;
            document.getElementById('notifIcon').className = `fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}`;
            notif.classList.remove('translate-y-48');
            setTimeout(() => notif.classList.add('translate-y-48'), 3000);
        }

        window.onload = () => { initRooms(); };
    </script>
</body>
</html>
